version: "3.8"

services:

  # Apicurio Registry - Schema and Prompt Template Registry
  # Stores PROMPT_TEMPLATE artifacts with full versioning and /render endpoint
  apicurio-registry:
    image: quay.io/apicurio/apicurio-registry:3.2.0
    container_name: apicurio-registry
    ports:
      - "8080:8080"
    environment:
      QUARKUS_HTTP_PORT: 8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - support-chat-network

  # Support Chat - Quarkus application with RAG pipeline
  # Uses Google AI Gemini for chat and in-process ONNX for embeddings
  support-chat:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: support-chat
    ports:
      - "8081:8080"
    environment:
      # Apicurio Registry connection
      REGISTRY_URL: "http://apicurio-registry:8080"

      # Google AI Gemini API key (required)
      GOOGLE_AI_GEMINI_API_KEY: "${GOOGLE_AI_GEMINI_API_KEY}"

      # CORS for widget embedding
      CORS_ORIGINS: "*"
    depends_on:
      apicurio-registry:
        condition: service_healthy
    networks:
      - support-chat-network

networks:
  support-chat-network:
    driver: bridge
