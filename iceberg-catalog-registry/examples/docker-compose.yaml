version: "3.8"

services:

  # Apicurio Registry - Schema Registry + Iceberg REST Catalog
  # Exposes Iceberg REST Catalog API at /apis/iceberg/v1
  apicurio-registry:
    image: quay.io/apicurio/apicurio-registry:3.2.0
    container_name: apicurio-registry
    ports:
      - "8080:8080"
    environment:
      QUARKUS_HTTP_PORT: 8080
      # Enable experimental features and Iceberg catalog
      APICURIO_FEATURES_EXPERIMENTAL_ENABLED: "true"
      APICURIO_ICEBERG_ENABLED: "true"
      APICURIO_ICEBERG_WAREHOUSE: "s3://warehouse/data"
      APICURIO_ICEBERG_DEFAULT_PREFIX: "default"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iceberg-network

  # MinIO - S3-compatible object storage for Iceberg data files
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - iceberg-network

  # Create the warehouse bucket on startup
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/warehouse --ignore-existing;
      echo 'Bucket created';
      "
    networks:
      - iceberg-network

volumes:
  minio-data:

networks:
  iceberg-network:
    driver: bridge
